<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Datos de contacto</title>
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Krub:wght@400;700&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Krub:wght@400;700&family=Lilita+One&display=swap" rel="stylesheet">
    <link rel="preload" href="styles.css" as="style">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h2 class="titulo">Contáctanos</h2>
        <form class="formulario">
           <fieldset>
           <legend>Contáctanos llenando todos los campos </legend>
            <div class="campo">
           <label>Nombre</label>
           <input class="input-text" type="text" placeholder="Escribe tu nombre">
           </div>
           <div class="campo">
           <label>Teléfono</label>
           <input class="input-text" type="tel" placeholder="Escribe tu teléfono">
           </div>
           <div class="campo">
           <label>Correo</label>
           <input class="input-text" type="email" placeholder="Escribe tu email">
           </div>
           <div class="campo">
           <label>Mensaje</label>
           <textarea class="input-text" placeholder="Escribe un mensaje"></textarea>
           </div>
           <div>
           <input class="boton" type="submit" value="ENVIAR">
           </div>
           </fieldset>
        </form>
</body>
</html>
