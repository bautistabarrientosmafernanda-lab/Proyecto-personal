<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Tienda Patitas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-light">

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-body p-5">
                        <h2 class="titulo text-center mb-4">Contáctanos</h2>
                        <form>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Nombre</label>
                                <input type="text" class="form-control form-control-lg" placeholder="Tu nombre completo">
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Teléfono</label>
                                <input type="tel" class="form-control form-control-lg" placeholder="Ej. 5512345678">
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Correo electrónico</label>
                                <input type="email" class="form-control form-control-lg" placeholder="nombre@ejemplo.com">
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Mensaje</label>
                                <textarea class="form-control" rows="4" placeholder="¿En qué podemos ayudarte?"></textarea>
                            </div>
                            <button type="submit" class="btn btn-dark btn-lg w-100 fw-bold">ENVIAR MENSAJE</button>
                            <div class="text-center mt-3">
                                <a href="proyecto personal.html" class="text-decoration-none text-muted">← Volver al inicio</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
